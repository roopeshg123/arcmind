<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arc Docs Assistant</title>
  <style>
    /* ------------------------------------------------------------------ reset */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0f0f0f;
      color: #ececec;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ---------------------------------------------------------------- header */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      background: #1a1a1a;
      border-bottom: 1px solid #2e2e2e;
      flex-shrink: 0;
    }
    header h1 { font-size: 1.1rem; font-weight: 600; letter-spacing: .02em; }
    header h1 span { color: #7c8ff5; }

    #status-badge {
      font-size: .75rem;
      padding: 4px 10px;
      border-radius: 999px;
      font-weight: 500;
      transition: background .3s, color .3s;
    }
    #status-badge.ready    { background: #1a3a2a; color: #4caf88; border: 1px solid #2e6e4e; }
    #status-badge.not_ready{ background: #3a1a1a; color: #cf7070; border: 1px solid #6e2e2e; }
    #status-badge.checking { background: #2a2a2a; color: #888;    border: 1px solid #444;    }

    /* --------------------------------------------------------------- toolbar */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 24px;
      background: #161616;
      border-bottom: 1px solid #2a2a2a;
      flex-shrink: 0;
    }
    #toolbar button {
      font-size: .8rem;
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid #3e3e3e;
      background: #252525;
      color: #ccc;
      cursor: pointer;
      transition: background .2s, color .2s;
    }
    #toolbar button:hover { background: #333; color: #fff; }
    #toolbar button.primary { background: #3b4fd8; border-color: #3b4fd8; color: #fff; }
    #toolbar button.primary:hover { background: #4d62f0; }
    #toolbar button:disabled { opacity: .4; cursor: not-allowed; }
    #ingest-status { font-size: .78rem; color: #888; }

    /* -------------------------------------------------------------- progress bar */
    #ingest-progress-wrap {
      display: none;
      width: 100%;
      margin-top: 6px;
    }
    #ingest-progress-bar-track {
      width: 100%;
      height: 6px;
      background: #2a2a2a;
      border-radius: 4px;
      overflow: hidden;
    }
    #ingest-progress-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #3b4fd8, #6c7ff0);
      border-radius: 4px;
      transition: width 0.4s ease;
    }
    #ingest-progress-label {
      font-size: .72rem;
      color: #666;
      margin-top: 3px;
      text-align: right;
    }

    /* -------------------------------------------------------------- messages */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 28px 0;
      scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 6px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

    .msg-row {
      display: flex;
      padding: 6px 24px;
      max-width: 860px;
      margin: 0 auto;
      width: 100%;
      gap: 14px;
      animation: fadeUp .2s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0);   }
    }

    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 6px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .8rem;
      font-weight: 700;
      margin-top: 2px;
    }
    .avatar.user { background: #3b4fd8; color: #fff; }
    .avatar.bot  { background: #2a2a3a; color: #7c8ff5; border: 1px solid #3a3a5a; }

    .bubble {
      flex: 1;
      line-height: 1.65;
      font-size: .925rem;
    }
    .bubble .name {
      font-size: .72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 6px;
    }
    .msg-row.user .bubble .name { color: #7c8ff5; }
    .msg-row.bot  .bubble .name { color: #4caf88; }

    .bubble .text { color: #e0e0e0; white-space: pre-wrap; word-break: break-word; }
    .bubble .text code {
      background: #1e1e2e;
      padding: 1px 5px;
      border-radius: 4px;
      font-family: "Fira Code", "Cascadia Code", monospace;
      font-size: .875em;
      color: #c792ea;
    }
    .bubble .text pre {
      background: #1e1e2e;
      border: 1px solid #2e2e3e;
      border-radius: 8px;
      padding: 14px 16px;
      overflow-x: auto;
      margin: 10px 0;
    }
    .bubble .text pre code { background: none; padding: 0; color: inherit; }
    .bubble .text ul, .bubble .text ol { padding-left: 20px; margin: 6px 0; }
    .bubble .text li { margin: 3px 0; }
    .bubble .text strong { color: #fff; }

    /* sources */
    .sources {
      margin-top: 10px;
      padding: 10px 14px;
      background: #161626;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      font-size: .78rem;
    }
    .sources .sources-title {
      color: #7c8ff5;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .sources ul { padding-left: 16px; color: #aaa; }
    .sources li { margin: 3px 0; }
    .sources li span { color: #888; display: block; margin-top: 1px; font-size: .72rem; }

    /* typing indicator */
    .typing .dot {
      display: inline-block;
      width: 7px; height: 7px;
      margin: 0 2px;
      background: #555;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing .dot:nth-child(2) { animation-delay: .2s; }
    .typing .dot:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%            { transform: translateY(-6px); }
    }

    /* empty state */
    #empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 10px;
      color: #444;
      user-select: none;
    }
    #empty-state svg { opacity: .3; }
    #empty-state p { font-size: .9rem; }

    /* ----------------------------------------------------------------- input */
    #input-area {
      padding: 16px 24px 20px;
      background: #161616;
      border-top: 1px solid #2a2a2a;
      flex-shrink: 0;
    }
    #input-form {
      display: flex;
      gap: 10px;
    }
    #question-input {
      flex: 1;
      background: #222;
      border: 1px solid #3a3a3a;
      border-radius: 10px;
      padding: 12px 16px;
      color: #ececec;
      font-size: .92rem;
      resize: none;
      height: 52px;
      max-height: 160px;
      overflow-y: auto;
      line-height: 1.5;
      transition: border-color .2s;
      outline: none;
    }
    #question-input:focus { border-color: #4d62f0; }
    #question-input::placeholder { color: #555; }

    #send-btn {
      background: #3b4fd8;
      border: none;
      border-radius: 10px;
      padding: 0 18px;
      cursor: pointer;
      transition: background .2s, transform .1s;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    #send-btn:hover:not(:disabled) { background: #4d62f0; }
    #send-btn:active:not(:disabled) { transform: scale(.96); }
    #send-btn:disabled { opacity: .35; cursor: not-allowed; }
    #send-btn svg { fill: #fff; }

    #stop-btn {
      background: #5a1a1a;
      border: 1px solid #8b2e2e;
      border-radius: 10px;
      padding: 0 18px;
      cursor: pointer;
      transition: background .2s, transform .1s;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 6px;
      flex-shrink: 0;
      color: #f08080;
      font-size: .82rem;
      font-weight: 600;
      height: 52px;
    }
    #stop-btn:hover { background: #7a2020; }
    #stop-btn:active { transform: scale(.96); }
    #stop-btn svg { fill: #f08080; }

    #input-hint { font-size: .72rem; color: #444; text-align: center; margin-top: 8px; }

    /* --------------------------------------------------------------- slash dropdown */
    #slash-dropdown {
      display: none;
      position: absolute;
      bottom: calc(100% + 6px);
      left: 0;
      right: 68px;
      background: #1e1e2e;
      border: 1px solid #3a3a5a;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 -4px 20px rgba(0,0,0,.5);
      z-index: 100;
    }
    .slash-option {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 10px 16px;
      cursor: pointer;
      transition: background .15s;
    }
    .slash-option:hover, .slash-option.selected {
      background: #2a2a3e;
    }
    .slash-option .cmd-icon {
      font-size: 1.1rem;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .slash-option .cmd-name {
      font-size: .85rem;
      font-weight: 600;
      color: #7c8ff5;
      font-family: "Fira Code", monospace;
    }
    .slash-option .cmd-desc {
      font-size: .78rem;
      color: #888;
      margin-top: 2px;
    }
    .slash-hint {
      font-size: .72rem;
      color: #4caf88;
      padding: 6px 16px 8px;
      border-top: 1px solid #2a2a3e;
      background: #181828;
    }

    /* ---------------------------------------------------------------- tool badge */
    .tool-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: .7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      padding: 2px 9px;
      border-radius: 999px;
      margin-bottom: 8px;
    }
    .tool-badge.error_decoder   { background: #3a1a1a; color: #f08080; border: 1px solid #8b2e2e; }
    .tool-badge.edi_explainer   { background: #1a2a3a; color: #7ab0f0; border: 1px solid #2e5e8b; }
    .tool-badge.similar_tickets { background: #1a2a1a; color: #80d080; border: 1px solid #2e6e2e; }
    .tool-badge.ticket_generator{ background: #2a1a3a; color: #c080f0; border: 1px solid #6e2e8b; }
    .tool-badge.connector_changelog { background: #2a2a1a; color: #d0c050; border: 1px solid #7e6e2e; }
    .tool-badge.script_generator     { background: #1a2a2a; color: #50d0c0; border: 1px solid #2e7e6e; }
    .tool-badge.script_debugger      { background: #2a1a2a; color: #d070d0; border: 1px solid #7e2e7e; }

    /* ------------------------------------------------------------- related issues */
    .related-issues {
      margin-top: 10px;
      padding: 10px 14px;
      background: #1a1a2a;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      font-size: .78rem;
    }
    .related-issues .related-title {
      color: #7c8ff5;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .related-issues ul { padding-left: 0; list-style: none; }
    .related-issues li {
      padding: 4px 0;
      border-bottom: 1px solid #1e1e3e;
      color: #aaa;
      display: flex;
      gap: 8px;
      align-items: baseline;
    }
    .related-issues li:last-child { border-bottom: none; }
    .related-issues .ri-ticket {
      font-weight: 700;
      color: #7c8ff5;
      font-family: monospace;
      flex-shrink: 0;
    }
    .related-issues .ri-status {
      font-size: .68rem;
      color: #666;
      flex-shrink: 0;
    }
    #input-wrapper { position: relative; max-width: 860px; margin: 0 auto; }
  </style>
</head>
<body>

<!-- =========================================================== HEADER -->
<header>
  <h1>Arc<span>Mind</span></h1>
  <span id="status-badge" class="checking">Checking…</span>
</header>

<!-- =========================================================== TOOLBAR -->
<div id="toolbar">
  <button id="ingest-btn" class="primary" onclick="triggerIngest()" title="Full re-index: drop all doc vectors and rebuild from scratch">⚡ Index Docs</button>
  <button id="update-docs-btn" onclick="triggerDocsUpdate()" title="Incremental update: only re-embed new or changed files">🔄 Update Docs</button>
  <button id="jira-btn" class="primary" onclick="triggerJiraIngest()" title="Full re-index: drop all Jira vectors and rebuild from scratch">🔗 Index Jira</button>
  <button id="update-jira-btn" onclick="triggerJiraUpdate()" title="Incremental update: only re-embed new or changed tickets">🔄 Update Jira</button>
  <button id="confluence-btn" class="primary" onclick="triggerConfluenceIngest()" title="Full re-index: drop all Confluence vectors and rebuild from scratch">📄 Index Confluence</button>
  <button id="update-confluence-btn" onclick="triggerConfluenceUpdate()" title="Incremental update: only re-embed new or changed pages">🔄 Update Confluence</button>
  <button onclick="clearChat()">🗑 Clear Chat</button>
  <span id="ingest-status"></span>
</div>
<div id="ingest-progress-wrap" style="padding: 0 16px 8px;">
  <div id="ingest-progress-bar-track"><div id="ingest-progress-bar-fill"></div></div>
  <div id="ingest-progress-label"></div>
</div>

<!-- =========================================================== MESSAGES -->
<div id="messages">
  <div id="empty-state">
    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24">
      <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm0-4h-2V7h2v8z"/>
    </svg>
    <p>Index your docs then ask any question about your application.</p>
  </div>
</div>

<!-- =========================================================== INPUT -->
<div id="input-area">
  <div id="input-wrapper">
    <div id="slash-dropdown"></div>
    <form id="input-form" onsubmit="sendMessage(event)" style="display:flex;gap:10px;">
      <textarea
        id="question-input"
        placeholder="Ask anything… or type / for Arc tools (e.g. /error, /similar, /ticket)"
        rows="1"
        onkeydown="handleKey(event)"
        oninput="handleSlashInput()"
      ></textarea>
      <button id="send-btn" type="submit" title="Send">
        <svg width="20" height="20" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
      <button id="stop-btn" type="button" title="Stop generating" onclick="stopGeneration()">
        <svg width="16" height="16" viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
        Stop
      </button>
    </form>
  </div>
  <p id="input-hint">Press Enter to send &nbsp;·&nbsp; Shift+Enter for new line &nbsp;·&nbsp; Type <kbd style="background:#222;border:1px solid #444;padding:1px 5px;border-radius:4px;font-size:.75em">/</kbd> for Arc tools</p>
</div>

<script>
  // ---------------------------------------------------------------- state
  let chatHistory  = [];   // [{role, content}, …]
  let messageLog   = [];   // [{role, content, sources}, …]  — persisted
  let isLoading    = false;
  let abortCtrl    = null;  // AbortController for the active request

  // ---------------------------------------------------------------- slash commands registry
  const SLASH_COMMANDS = {
    "/error": {
      icon: "🔴",
      label: "/error",
      desc: "Decode an Arc error log — paste the error after the command",
      hint: "Paste your error message after /error ",
      endpoint: "/api/tools/error-decode",
      bodyKey: "error_text",
    },
    "/explain": {
      icon: "📋",
      label: "/explain",
      desc: "Explain an X12 or EDIFACT message — paste the raw EDI after the command",
      hint: "Paste raw EDI (X12/EDIFACT) after /explain ",
      endpoint: "/api/tools/edi-explain",
      bodyKey: "edi_text",
    },
    "/similar": {
      icon: "🔗",
      label: "/similar",
      desc: "Find tickets related to a Jira ID — e.g. /similar ARCESB-12345",
      hint: "Type a Jira ticket ID after /similar ",
      endpoint: "/api/tools/similar",
      bodyKey: "ticket_id",
    },
    "/ticket": {
      icon: "📝",
      label: "/ticket",
      desc: "Draft a Jira ticket from plain English — e.g. /ticket AS2 connection times out",
      hint: "Describe the issue in plain English after /ticket ",
      endpoint: "/api/tools/generate-ticket",
      bodyKey: "description",
    },
    "/changelog": {
      icon: "📅",
      label: "/changelog",
      desc: "Get the change history for a connector — e.g. /changelog AS2",
      hint: "Type a connector name after /changelog  (e.g. AS2, SFTP, X12)",
      endpoint: "/api/tools/changelog",
      bodyKey: "connector",
    },
    "/script": {
      icon: "⚙️",
      label: "/script",
      desc: "Generate an ArcScript or Python script — e.g. /script loop over items and set output field",
      hint: "Describe what the script should do after /script ",
      endpoint: "/api/tools/generate-script",
      bodyKey: "requirement",
    },
    "/fix": {
      icon: "🔧",
      label: "/fix",
      desc: "Fix a broken script — paste: <error description or JSON test file> ||| <broken script>",
      hint: "Format: /fix <what is wrong OR paste JSON test file> ||| <paste broken script here>",
      endpoint: "/api/tools/fix-script",
      bodyKey: null,          // special: split on ||| into script + error_description
      special: "fix_script",
    },
  };

  const TOOL_LABELS = {
    error_decoder:        "🔴 Error Decoder",
    edi_explainer:        "📋 EDI Explainer",
    similar_tickets:      "🔗 Similar Tickets",
    ticket_generator:     "📝 Ticket Generator",
    connector_changelog:  "📅 Changelog",
    script_generator:     "⚙️ Script Generator",
    script_debugger:      "🔧 Script Debugger",
  };

  let slashDropdownIndex = -1;

  // ---------------------------------------------------------------- slash dropdown
  function handleSlashInput() {
    const input = document.getElementById("question-input");
    const val   = input.value;

    // Auto-grow
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 160) + "px";

    if (!val.startsWith("/")) { hideSlashDropdown(); return; }

    const lower   = val.toLowerCase();
    const matches = Object.values(SLASH_COMMANDS).filter(c =>
      c.label.startsWith(lower.split(" ")[0])
    );

    if (matches.length === 0) { hideSlashDropdown(); return; }

    // If user has finished typing the command and a space, show only the hint
    const parts = val.split(" ");
    const cmd   = SLASH_COMMANDS[parts[0].toLowerCase()];
    const ddEl  = document.getElementById("slash-dropdown");

    if (cmd && parts.length > 1) {
      ddEl.innerHTML = `<div class="slash-hint">💡 ${escapeHtml(cmd.hint)}</div>`;
      ddEl.style.display = "block";
      return;
    }

    // Show matching commands
    ddEl.innerHTML = matches.map((c, i) => `
      <div class="slash-option${i === slashDropdownIndex ? " selected" : ""}"
           onclick="selectSlashCommand('${c.label}')">
        <span class="cmd-icon">${c.icon}</span>
        <div>
          <div class="cmd-name">${escapeHtml(c.label)}</div>
          <div class="cmd-desc">${escapeHtml(c.desc)}</div>
        </div>
      </div>`).join("") +
      `<div class="slash-hint">↑↓ navigate · Tab/Enter to select</div>`;
    ddEl.style.display = "block";
    slashDropdownIndex = -1;
  }

  function hideSlashDropdown() {
    const ddEl = document.getElementById("slash-dropdown");
    ddEl.style.display = "none";
    ddEl.innerHTML     = "";
    slashDropdownIndex = -1;
  }

  function selectSlashCommand(cmdLabel) {
    const input = document.getElementById("question-input");
    input.value = cmdLabel + " ";
    hideSlashDropdown();
    input.focus();
    handleSlashInput();
  }

  function navigateDropdown(dir) {
    const ddEl   = document.getElementById("slash-dropdown");
    const opts   = ddEl.querySelectorAll(".slash-option");
    if (!opts.length) return false;
    slashDropdownIndex = (slashDropdownIndex + dir + opts.length) % opts.length;
    opts.forEach((o, i) => o.classList.toggle("selected", i === slashDropdownIndex));
    return true;
  }

  // Parse "/command arg" → { cmd: SLASH_COMMANDS entry, arg: "arg text" } or null
  function parseSlashCommand(text) {
    if (!text.startsWith("/")) return null;
    const spaceIdx = text.indexOf(" ");
    if (spaceIdx === -1) return null;
    const cmdKey = text.slice(0, spaceIdx).toLowerCase();
    const cmd    = SLASH_COMMANDS[cmdKey];
    if (!cmd) return null;
    const arg = text.slice(spaceIdx + 1).trim();
    if (!arg) return null;
    return { cmd, arg };
  }

  // ---------------------------------------------------------------- persistence
  function saveSession() {
    try {
      localStorage.setItem("arcmind_chat_history", JSON.stringify(chatHistory));
      localStorage.setItem("arcmind_message_log",  JSON.stringify(messageLog));
    } catch { /* storage full or unavailable */ }
  }

  function restoreSession() {
    try {
      const savedHistory = localStorage.getItem("arcmind_chat_history");
      const savedLog     = localStorage.getItem("arcmind_message_log");
      if (!savedHistory || !savedLog) return;
      const history = JSON.parse(savedHistory);
      const log     = JSON.parse(savedLog);
      if (!Array.isArray(history) || history.length === 0) return;
      chatHistory = history;
      log.forEach(msg => appendMessage(msg.role, msg.content, msg.sources || []));
      if (log.length > 0) hideEmptyState();
    } catch {
      localStorage.removeItem("arcmind_chat_history");
      localStorage.removeItem("arcmind_message_log");
    }
  }

  // ---------------------------------------------------------------- startup
  window.addEventListener("DOMContentLoaded", () => {
    restoreSession();
    checkStatus();
  });

  async function checkStatus() {
    const badge = document.getElementById("status-badge");
    try {
      const res  = await fetch("/api/status");
      const data = await res.json();
      if (data.status === "ready") {
        badge.className = "ready";
        badge.textContent = `✓ Ready — ${data.total_vectors.toLocaleString()} vectors (docs: ${data.docs_vectors}, jira: ${data.jira_vectors}, confluence: ${data.confluence_vectors ?? 0})`;
      } else {
        badge.className = "not_ready";
        badge.textContent = "✗ Not indexed";
      }
    } catch {
      badge.className = "not_ready";
      badge.textContent = "✗ Server offline";
    }
  }

  // ---------------------------------------------------------------- ingest helpers
  function showProgress(pct, label) {
    const wrap  = document.getElementById("ingest-progress-wrap");
    const fill  = document.getElementById("ingest-progress-bar-fill");
    const lbl   = document.getElementById("ingest-progress-label");
    wrap.style.display = "block";
    fill.style.width   = Math.min(pct, 100) + "%";
    lbl.textContent    = label;
  }
  function hideProgress() {
    document.getElementById("ingest-progress-wrap").style.display = "none";

  // ---------------------------------------------------------------- chat
  function handleKey(e) {
    const ddVisible = document.getElementById("slash-dropdown").style.display === "block";

    // Dropdown navigation
    if (ddVisible) {
      if (e.key === "ArrowUp")   { e.preventDefault(); navigateDropdown(-1); return; }
      if (e.key === "ArrowDown") { e.preventDefault(); navigateDropdown(+1); return; }
      if (e.key === "Tab" || (e.key === "Enter" && slashDropdownIndex >= 0)) {
        e.preventDefault();
        const opts = document.getElementById("slash-dropdown").querySelectorAll(".slash-option");
        if (slashDropdownIndex >= 0 && opts[slashDropdownIndex]) {
          const lbl = opts[slashDropdownIndex].querySelector(".cmd-name").textContent;
          selectSlashCommand(lbl);
        } else if (e.key === "Tab" && opts.length) {
          const lbl = opts[0].querySelector(".cmd-name").textContent;
          selectSlashCommand(lbl);
        }
        return;
      }
      if (e.key === "Escape") { hideSlashDropdown(); return; }
    }

    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      document.getElementById("input-form").requestSubmit();
      return;
    }
    // Auto-grow textarea
    const ta = e.target;
    ta.style.height = "auto";
    ta.style.height = Math.min(ta.scrollHeight, 160) + "px";
  }

  async function sendMessage(e) {
    e.preventDefault();
    if (isLoading) return;

    const input    = document.getElementById("question-input");
    const question = input.value.trim();
    if (!question) return;

    hideSlashDropdown();

    // Check if this is a slash command
    const parsed = parseSlashCommand(question);
    if (parsed) {
      await runSlashCommand(parsed, question);
      return;
    }

    input.value       = "";
    input.style.height = "52px";

    hideEmptyState();
    appendMessage("user", question);
    chatHistory.push({ role: "user", content: question });
    messageLog.push({ role: "user", content: question, sources: [] });
    saveSession();

    const typingId = appendTyping();
    isLoading      = true;
    abortCtrl      = new AbortController();
    setInputEnabled(false);
    showStopButton(true);

    try {
      const res  = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        signal: abortCtrl.signal,
        body: JSON.stringify({
          question,
          history: chatHistory.slice(0, -1),   // exclude the question we just added
        }),
      });

      removeTyping(typingId);

      if (!res.ok) {
        const err = await res.json();
        appendMessage("bot", `⚠️ ${err.detail || "An error occurred."}`);
      } else {
        const data = await res.json();
        chatHistory.push({ role: "assistant", content: data.answer });
        appendMessage("bot", data.answer, data.sources, null, data.jira_issues);
        messageLog.push({ role: "bot", content: data.answer, sources: data.sources || [] });
        saveSession();
      }
    } catch (err) {
      removeTyping(typingId);
      if (err.name === "AbortError") {
        chatHistory.pop();
        messageLog.pop();
        saveSession();
        appendMessage("bot", "_Generation stopped._");
      } else {
        appendMessage("bot", "⚠️ Could not reach the server. Make sure the backend is running.");
      }
    } finally {
      isLoading  = false;
      abortCtrl  = null;
      showStopButton(false);
      setInputEnabled(true);
      document.getElementById("question-input").focus();
    }
  }

  // ---------------------------------------------------------------- slash command runner
  async function runSlashCommand(parsed, rawQuestion) {
    const { cmd, arg } = parsed;
    const input = document.getElementById("question-input");
    input.value        = "";
    input.style.height = "52px";

    hideEmptyState();
    appendMessage("user", rawQuestion);
    messageLog.push({ role: "user", content: rawQuestion, sources: [] });
    saveSession();

    const typingId = appendTyping();
    isLoading  = true;
    abortCtrl  = new AbortController();
    setInputEnabled(false);
    showStopButton(true);

    try {
      let body = {};
      if (cmd.special === "fix_script") {
        // Format: <error description> ||| <broken script>
        const sepIdx = arg.indexOf("|||");
        if (sepIdx === -1) {
          removeTyping(typingId);
          appendMessage("bot", "⚠️ `/fix` format: describe the error (or paste your JSON test file), then `|||`, then paste the broken script.\n\nExamples:\n`/fix arc:set is using wrong attribute ||| <arc:script>...</arc:script>`\n`/fix {\"name\": \"Roopesh\", ...} ||| <arc:script>...</arc:script>`  ← paste JSON test data to show the script produced no output");
          isLoading = false; abortCtrl = null; showStopButton(false); setInputEnabled(true);
          document.getElementById("question-input").focus();
          return;
        }
        body = {
          error_description: arg.slice(0, sepIdx).trim(),
          script:            arg.slice(sepIdx + 3).trim(),
        };
      } else {
        body[cmd.bodyKey] = arg;
      }

      const res = await fetch(cmd.endpoint, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        signal: abortCtrl.signal,
        body: JSON.stringify(body),
      });

      removeTyping(typingId);

      if (!res.ok) {
        const err = await res.json();
        appendMessage("bot", `⚠️ ${err.detail || "Tool error."}`, [], null);
      } else {
        const data = await res.json();
        appendMessage("bot", data.answer, data.sources || [], data.tool, data.jira_issues || []);
        messageLog.push({ role: "bot", content: data.answer, sources: data.sources || [] });
        saveSession();
      }
    } catch (err) {
      removeTyping(typingId);
      if (err.name !== "AbortError") {
        appendMessage("bot", "⚠️ Could not reach the server.");
      }
    } finally {
      isLoading  = false;
      abortCtrl  = null;
      showStopButton(false);
      setInputEnabled(true);
      document.getElementById("question-input").focus();
    }
  }

  // ---------------------------------------------------------------- DOM helpers
  function hideEmptyState() {
    const es = document.getElementById("empty-state");
    if (es) es.remove();
  }

  function appendMessage(role, text, sources = [], toolType = null, jiraIssues = []) {
    const container = document.getElementById("messages");
    const row = document.createElement("div");
    row.className = `msg-row ${role}`;

    const avatar = document.createElement("div");
    avatar.className = `avatar ${role === "user" ? "user" : "bot"}`;
    avatar.textContent = role === "user" ? "U" : "AI";

    const bubble = document.createElement("div");
    bubble.className = "bubble";

    const name = document.createElement("div");
    name.className = "name";
    name.textContent = role === "user" ? "You" : "Assistant";

    bubble.appendChild(name);

    // Tool badge (only for bot tool responses)
    if (toolType && TOOL_LABELS[toolType]) {
      const badge = document.createElement("div");
      badge.className = `tool-badge ${toolType}`;
      badge.textContent = TOOL_LABELS[toolType];
      bubble.appendChild(badge);
    }

    const textDiv = document.createElement("div");
    textDiv.className = "text";
    textDiv.innerHTML = markdownToHtml(text);
    bubble.appendChild(textDiv);

    // Sources
    if (sources && sources.length > 0) {
      const srcBox = document.createElement("div");
      srcBox.className = "sources";
      srcBox.innerHTML = `<div class="sources-title">📄 Sources</div>`;
      const ul = document.createElement("ul");
      sources.forEach(s => {
        const li = document.createElement("li");
        li.innerHTML = `<strong>${escapeHtml(s.source)}</strong><span>${escapeHtml(s.content)}</span>`;
        ul.appendChild(li);
      });
      srcBox.appendChild(ul);
      bubble.appendChild(srcBox);
    }

    // Related / matched Jira issues panel
    if (jiraIssues && jiraIssues.length > 0) {
      const seen = new Set();
      const unique = jiraIssues.filter(j => {
        if (!j.ticket || seen.has(j.ticket)) return false;
        seen.add(j.ticket);
        return true;
      });
      if (unique.length > 0) {
        const riBox = document.createElement("div");
        riBox.className = "related-issues";
        riBox.innerHTML = `<div class="related-title">🎫 Referenced Jira Tickets</div>`;
        const ul = document.createElement("ul");
        unique.forEach(j => {
          const li = document.createElement("li");
          li.innerHTML =
            `<span class="ri-ticket">${escapeHtml(j.ticket)}</span>` +
            `<span class="ri-status">[${escapeHtml(j.status || "?")}]</span>` +
            `<span>${escapeHtml(j.component || "")}</span>`;
          ul.appendChild(li);
        });
        riBox.appendChild(ul);
        bubble.appendChild(riBox);
      }
    }

    row.appendChild(avatar);
    row.appendChild(bubble);
    container.appendChild(row);
    container.scrollTop = container.scrollHeight;
    return row;
  }

  function appendTyping() {
    const id        = "typing-" + Date.now();
    const container = document.getElementById("messages");
    const row       = document.createElement("div");
    row.className   = "msg-row bot";
    row.id          = id;

    const avatar = document.createElement("div");
    avatar.className = "avatar bot";
    avatar.textContent = "AI";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerHTML = `
      <div class="name">Assistant</div>
      <div class="typing">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>`;

    row.appendChild(avatar);
    row.appendChild(bubble);
    container.appendChild(row);
    container.scrollTop = container.scrollHeight;
    return id;
  }

  function removeTyping(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
  }

  function setInputEnabled(enabled) {
    document.getElementById("question-input").disabled = !enabled;
    document.getElementById("send-btn").disabled       = !enabled;
  }

  function clearChat() {
    chatHistory = [];
    messageLog  = [];
    localStorage.removeItem("arcmind_chat_history");
    localStorage.removeItem("arcmind_message_log");
    const container = document.getElementById("messages");
    container.innerHTML = `
      <div id="empty-state">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm0-4h-2V7h2v8z"/>
        </svg>
        <p>Index your docs then ask any question about your application.</p>
      </div>`;
  }

  // ---------------------------------------------------------------- mini markdown renderer
  function markdownToHtml(text) {
    let html = escapeHtml(text);
    // code blocks
    html = html.replace(/```([\s\S]*?)```/g, (_, code) =>
      `<pre><code>${code.trim()}</code></pre>`);
    // inline code
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
    // bold
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    // italic
    html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
    // markdown links [text](url) — rendered as clickable hyperlinks
    html = html.replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g,
      '<a href="$2" target="_blank" rel="noopener noreferrer" style="color:#7c8ff5;text-decoration:underline;">$1</a>');
    // headers
    html = html.replace(/^### (.+)$/gm, '<strong>$1</strong>');
    html = html.replace(/^## (.+)$/gm, '<strong>$1</strong>');
    html = html.replace(/^# (.+)$/gm, '<strong>$1</strong>');
    // unordered lists
    html = html.replace(/^\s*[-*] (.+)$/gm, '<li>$1</li>');
    html = html.replace(/(<li>.*<\/li>(\n|$))+/g, m => `<ul>${m}</ul>`);
    // ordered lists
    html = html.replace(/^\s*\d+\. (.+)$/gm, '<li>$1</li>');
    // line breaks
    html = html.replace(/\n/g, '<br>');
    return html;
  }

  function escapeHtml(text) {
    return String(text)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }
</script>
