services:
  arcmind:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arcmind
    ports:
      - "8000:8000"
    env_file:
      # All variables from .env are passed to the container automatically.
      # Copy .env.example to .env and fill in your values before running.
      - .env
    environment:
      # Force the container to always use the mounted path, regardless of what
      # DOCS_DIR is set to in .env (which is the Windows host path).
      - CHROMA_DB_DIR=/app/chroma_db
      - DOCS_DIR=/app/docs
    volumes:
      # Mount the Windows docs folder into the container (used when DOCS_DIR is set in .env).
      # If you are using DOCS_URL instead, this mounts an empty ./docs folder — harmless.
      - ${DOCS_DIR:-./docs}:/app/docs:ro
      # Persist the vector store across container restarts
      - chroma_data:/app/chroma_db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/status')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  chroma_data:
    driver: local
